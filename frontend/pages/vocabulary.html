<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Archivist | Vocabulary</title>
    <script src="/assets/js/tailwind-theme.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,700&family=Manrope:wght@400;500;600;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/assets/styles/app.css" />
  </head>
  <body class="app-body bg-background text-on-background">
    <div id="app-sidebar"></div>
    <main class="app-main min-h-screen lg:ml-64">
      <div id="app-topbar"></div>
      <div class="page-shell px-5 pb-12 pt-8 lg:px-12">
        <header class="page-hero hero-panel hero-panel--warm mb-10 flex flex-col gap-6 rounded-[2rem] px-8 py-10 lg:flex-row lg:items-end lg:justify-between">
          <div>
            <p class="font-label text-[10px] font-bold uppercase tracking-[0.24em] text-outline">Personal Lexicon</p>
            <h1 class="page-title mt-3 text-5xl font-bold tracking-normal text-primary lg:text-6xl">Vocabulary Lexicon</h1>
            <p class="page-copy mt-4 max-w-3xl text-xl text-on-surface-variant">Review your saved words, monitor what is due, and start focused flashcard sessions.</p>
          </div>
          <a href="/flashcards" class="inline-flex items-center justify-center rounded-xl bg-gradient-to-br from-primary to-primary-container px-6 py-4 font-label text-sm font-bold uppercase tracking-[0.22em] text-on-primary">Start Flashcard Session</a>
        </header>

        <section class="mb-10 grid gap-6 md:grid-cols-3">
          <div class="tinted-card metric-card rounded-[1.5rem] p-7">
            <p class="font-label text-[10px] font-bold uppercase tracking-[0.24em] text-outline">Saved Words</p>
            <h2 id="total-saved" class="metric-value mt-4 text-4xl font-bold text-primary"></h2>
          </div>
          <div class="tinted-card tinted-card--sage metric-card rounded-[1.5rem] p-7">
            <p class="font-label text-[10px] font-bold uppercase tracking-[0.24em] text-outline">Due Now</p>
            <h2 id="due-now" class="metric-value mt-4 text-4xl font-bold text-primary"></h2>
          </div>
          <div class="tinted-card metric-card rounded-[1.5rem] p-7">
            <p class="font-label text-[10px] font-bold uppercase tracking-[0.24em] text-outline">Mastered</p>
            <h2 id="mastered" class="metric-value mt-4 text-4xl font-bold text-primary"></h2>
          </div>
        </section>

        <section class="admin-section-shell vocab-table-shell overflow-hidden rounded-[1.75rem]">
          <div class="flex flex-col gap-4 border-b border-surface-container-low px-6 py-5 lg:flex-row lg:items-center lg:justify-between">
            <div>
              <h2 class="text-2xl font-bold text-primary">My Saved Words</h2>
              <p id="table-count" class="mt-2 font-label text-xs uppercase tracking-[0.18em] text-outline"></p>
            </div>
            <div class="flex flex-wrap gap-3">
              <button data-sort="newest" class="chip-active rounded-full bg-surface-container-high px-5 py-2 font-label text-xs font-bold uppercase tracking-[0.18em] text-primary">Newest</button>
              <button data-sort="oldest" class="rounded-full bg-surface-container-high px-5 py-2 font-label text-xs font-bold uppercase tracking-[0.18em] text-primary">Oldest</button>
              <button data-sort="word" class="rounded-full bg-surface-container-high px-5 py-2 font-label text-xs font-bold uppercase tracking-[0.18em] text-primary">Word</button>
            </div>
          </div>
          <div class="overflow-x-auto">
            <table class="vocab-table min-w-full text-left">
              <thead class="bg-surface-container-low">
                <tr>
                  <th class="px-6 py-4 font-label text-xs font-bold uppercase tracking-[0.18em] text-outline">Word</th>
                  <th class="px-6 py-4 font-label text-xs font-bold uppercase tracking-[0.18em] text-outline">Meaning</th>
                  <th class="px-6 py-4 text-center font-label text-xs font-bold uppercase tracking-[0.18em] text-outline">Level</th>
                  <th class="px-6 py-4 text-right font-label text-xs font-bold uppercase tracking-[0.18em] text-outline">Date Added</th>
                </tr>
              </thead>
              <tbody id="vocab-table-body" class="divide-y divide-surface-container-low"></tbody>
            </table>
          </div>
        </section>
      </div>
    </main>
    <script type="module" src="/assets/js/vocabulary-page.js"></script>
  </body>
</html>
